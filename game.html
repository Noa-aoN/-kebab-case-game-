<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>-ケバブ-ケース-ゲーム-</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="favicon.ico" type="image/vnd.microsoft.icon">
  <link rel="icon" href="favicon.ico" type="image/vnd.microsoft.icon">

  <!-- Styles -->
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Analytics -->
  <script src="js/analytics.js"></script>
</head>

<body class="game-page relative h-screen bg-gray-100">

  <!-- ===========================
        ヘッダー
  ============================ -->
  <header class="site-header site-header--soft site-header--compact site-header--sticky">
    <h1 class="text-center text-lg font-bold m-2 text-yellow-800">
      🥙 落下文字を見極めて串を飛ばし最高のケバブケースを作ろう 🥙
    </h1>
  </header>

  <!-- ===========================
        メインコンテンツ
  ============================ -->
  <main id="gameArea" class="game-area relative w-full">

    <!-- 串画像 -->
    <img id="skewer" src="image/skewer_sm.webp" alt="skewer">

    <!-- ===========================
          共通ボタン（中央固定）
    ============================ -->
    <div
      class="action-bar fixed left-1/2 transform -translate-x-1/2
             button-grid grid justify-center gap-3 z-30
             sm:flex sm:flex-nowrap sm:justify-center"
    >
      <!-- ホームボタン -->
      <a
        href="index.html"
        class="touch-button inline-flex items-center justify-center px-6 py-2 bg-blue-500/80 text-white font-semibold rounded-lg shadow-lg
               hover:bg-blue-600/80 transition duration-200 backdrop-blur-sm
               w-auto min-w-fit"
      >
        ホーム
      </a>

      <!-- 操作説明 -->
      <a
        href="rules.html"
        class="touch-button inline-flex items-center justify-center px-6 py-2 bg-green-500/80 text-white font-semibold rounded-lg shadow-lg
               hover:bg-green-600/80 transition duration-200 backdrop-blur-sm
               w-auto min-w-fit"
      >
        操作説明
      </a>

      <!-- 用語解説 -->
      <a
        href="glossary.html"
        class="touch-button inline-flex items-center justify-center px-6 py-2 bg-green-500/80 text-white font-semibold rounded-lg shadow-lg
               hover:bg-green-600/80 transition duration-200 backdrop-blur-sm
               w-auto min-w-fit"
      >
        用語解説
      </a>

      <!-- 串を飛ばすボタン -->
      <button
        id="moveButton"
        class="touch-button px-6 py-2 bg-red-500/80 text-white font-semibold rounded-lg shadow-lg
               hover:bg-red-600/80 transition duration-200 backdrop-blur-sm
               w-auto min-w-fit"
      >
        串を飛ばす
      </button>
    </div>
  </main>

  <!-- ===========================
        フッター
  ============================ -->
  <footer class="site-footer">
    <div class="flex flex-col sm:flex-row items-center justify-center relative">
      <!-- 左/中央部分 -->
      <p class="text-center m-1 text-sm text-yellow-800 sm:text-yellow-900 sm:text-base">
        -kebab-case-game-@NOA
      </p>
      <!-- スマホで少しスペース -->
      <span class="hidden sm:inline mx-2"></span>
      <!-- リンク部分 -->
      <a
        href="privacy.html"
        class="mt-1 sm:mt-0 sm:absolute sm:right-4 text-yellow-900/90 hover:underline text-sm"
      >
        プライバシーポリシー
      </a>
    </div>
  </footer>

  <script src="js/game-data.js"></script>
  <script src="js/game-core.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
