<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>-ケバブ-ケース-ゲーム-</title>

  <!-- =========================
        ファビコン設定
  ========================== -->
  <link rel="shortcut icon" href="favicon.ico" type="image/vnd.microsoft.icon" />
  <link rel="icon" href="favicon.ico" type="image/vnd.microsoft.icon" />

  <!-- ==============================
       Google tag (gtag.js)
  =============================== -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M4H2XHF2LC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-M4H2XHF2LC');
  </script>

  <!-- ==============================
       Tailwind CSS 読み込み
  =============================== -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ==============================
       フォント設定
  =============================== -->
  <!-- フォント最適化：先読み・非同期読み込みなど -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- M+ Rounded -->
  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >
  <!-- Quicksand -->
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  </noscript>

  <!-- ================================
       カスタムスタイル
  ================================= -->
  <style>
    body {
      font-family: 'Quicksand', 'M PLUS Rounded 1c','Zen Maru Gothic', 'Meiryo', sans-serif;
    }

    /* 落下単語・結果表示用フォント */
    .word,
    #wordText,
    #hitPercentText,
    #scoreText {
      font-family: 'Quicksand', 'M PLUS Rounded 1c','Zen Maru Gothic', 'Meiryo', sans-serif;
      font-weight: 700;
    }

    /* スコア表示デザイン */
    #scoreText {
      background: rgba(255, 255, 255, 0.7);
      color: red;
      padding: 0.3em 0.8em;
      border-radius: 0.5em;
      text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      display: inline-block;
    }

    /* 下1/3に配置 */
    .bottom-third {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%) translateY(50%);
      text-align: center;
      width: 100%;
    }

    @media screen and (max-width: 640px) {
      /* ボタン全体を少し下に移動 */
      .fixed.bottom-20 {
        bottom: 3rem !important; /* ← 通常は5rem相当、ここでは約6.4remに下げる */
      }
    }
  </style>
</head>

<body class="bg-gray-200 relative min-h-screen w-screen bg-[url('image/many_kebab.png')] bg-center bg-cover">

  <!-- =========================
        ヘッダー
  ========================== -->
  <header class="bg-amber-300/80 w-full shadow-md p-1 sticky top-0 z-20">
    <h1 class="text-center text-lg font-bold m-2 text-yellow-800">🥙 ゲーム結果 🥙</h1>
  </header>

  <!-- =========================
        メインコンテンツ（結果表示）
  ========================== -->
  <main class="flex justify-center items-center min-h-[calc(100vh-100px)] relative z-10 px-4">
    <div class="relative w-full max-w-[90vw] max-h-[90vh] p-4">

      <!-- 結果コンテナ（正方形） -->
      <div id="resultContainer" class="relative bg-gray-100 rounded-lg shadow-lg flex justify-center items-center overflow-hidden mx-auto">
        <img id="resultImg" src="" alt="" class="w-full h-full object-contain" />

        <!-- 下部テキスト群 -->
        <div class="bottom-third flex flex-col justify-center items-center px-2">
          <span id="wordText" class="font-bold text-white drop-shadow-lg text-center"></span>
          <span id="scoreText" class="font-bold text-white drop-shadow-lg mt-2 text-center text-xl"></span>
          <span id="hitPercentText" class="font-semibold text-white drop-shadow-lg mt-1 text-center"></span>
        </div>
      </div>

    </div>
  </main>

  <!-- =========================
        固定ボタン群（共通デザイン）
  ========================== -->
  <div
    class="fixed bottom-20 left-1/2 transform -translate-x-1/2 
           grid justify-center gap-3 z-30
           sm:flex sm:flex-nowrap sm:justify-center"
    style="grid-template-columns: repeat(2, max-content);"
  >
    <!-- ホームボタン -->
    <button
      onclick="location.href='index.html'"
      class="px-6 py-2 bg-blue-500/80 text-white font-semibold rounded-lg shadow-lg 
             hover:bg-blue-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      ホーム
    </button>

    <!-- ゲーム再挑戦ボタン -->
    <button
      onclick="location.href='game.html'"
      class="px-6 py-2 bg-red-500/80 text-white font-semibold rounded-lg shadow-lg 
             hover:bg-red-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      ゲーム再挑戦
    </button>

    <!-- 結果シェアボタン -->
    <button
      id="shareButton"
      class="px-6 py-2 bg-green-500/80 text-white font-semibold rounded-lg shadow-lg 
             hover:bg-green-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      結果シェア
    </button>
  </div>

  <!-- =========================
        フッター
  ========================== -->
  <footer class="bg-amber-300/80 w-full shadow-inner p-2 fixed bottom-0 z-20 backdrop-blur-sm">
    <div class="flex flex-col sm:flex-row items-center justify-center relative">
      <!-- 左/中央部分 -->
      <p class="text-center m-1 text-sm text-yellow-800 sm:text-yellow-900 sm:text-base">
        -kebab-case-game-@NOA
      </p>
      <!-- スマホで少しスペース -->
      <span class="hidden sm:inline mx-2"></span>
      <!-- リンク部分 -->
      <a
        href="privacy.html"
        class="mt-1 sm:mt-0 sm:absolute sm:right-4 text-yellow-900/90 hover:underline text-sm"
      >
        プライバシーポリシー
      </a>
    </div>
  </footer>

  <!-- =========================
        スクリプト
  ========================== -->
  <script>
    // === 要素取得 ===
    const resultContainer = document.getElementById('resultContainer');
    const resultImg = document.getElementById("resultImg");
    const wordText = document.getElementById("wordText");
    const hitPercentText = document.getElementById("hitPercentText");
    const scoreText = document.getElementById("scoreText");

    // === URLパラメータ取得 ===
    const params = new URLSearchParams(window.location.search);
    const word = params.get("word") || "不明";
    const hitPercent = parseFloat(params.get("hitPercent")) || 0;

    // === ケース判定用パターン ===
    const patterns = [
      { regex: /^[a-z][A-Z][a-z0-9]+([A-Z][a-z0-9]*)*$/, img: "image/hungarian.png", label: "ハンガリアン記法" },
      { regex: /^[a-z]+([A-Z][a-z0-9]*)+$/, img: "image/camel.png", label: "キャメルケース" },
      { regex: /^[A-Z][a-z0-9]+([A-Z][a-z0-9]*)+$/, img: "image/upper_camel.png", label: "アッパーキャメルケース" },
      { regex: /^[a-z0-9]+(_[a-z0-9]+)+$/, img: "image/snake.png", label: "スネークケース" },
      { regex: /^[A-Z0-9]+(_[A-Z0-9]+)+$/, img: "image/upper_snake.png", label: "アッパースネークケース" },
      { regex: /^[a-z0-9]+( [a-z0-9]+)+$/, img: "image/ok_kebab.png", label: "ケバブケース", isKebabTarget: true },
      { regex: /^[A-Z][a-z0-9]+( [A-Z][a-z0-9]+)+$/, img: "image/ok_kebab.png", label: "アッパーケバブケース", isKebabTarget: true },
      { regex: /^[a-z0-9]+(\.[a-z0-9]+)+$/, img: "image/dot.png", label: "ドット記法" },
    ];

    // === マッチングと結果画像設定 ===
    const matched = patterns.find(p => p.regex.test(word)) || { img: "image/miss_kebab.png", label: "不明" };
    const isKebabTarget = Boolean(matched.isKebabTarget);
    resultImg.src = matched.img;
    resultImg.alt = matched.label;

    // === 単語表示（ケバブ用に置換） ===
    wordText.textContent = word.replace(" ", "-");

    // === スコア算出関数 ===
    const calcScore = hitPercent => {
      const diff = Math.abs(hitPercent - 50);
      return Math.max(0, Math.round(100 - diff * 2));
    };

    // === ランク判定関数 ===
    const getRank = score => {
      if (isKebabTarget) {
        if (score >= 100) return { label: "Perfect!", color: "text-orange-300" };
        if (score >= 90)  return { label: "Great!", color: "text-yellow-300" };
        if (score >= 75)  return { label: "Good!", color: "text-green-300" };
        if (score >= 50)  return { label: "OK!", color: "text-blue-300" };
        return { label: "Miss...", color: "text-red-400" };
      } else {
        return { label: matched.label + "を刺した！", color: "text-red-400" };
      }
    };

    // === スコア・ランク判定 ===
    const score = calcScore(hitPercent);
    const rank = getRank(score);

    // === ケバブ専用画像分岐 ===
    if (isKebabTarget) {
      if (hitPercent >= 85) {
        resultImg.src = "image/kebab_snake.png";
        wordText.textContent = word.replace(" ", "_");
      } else {
        if (score >= 100) resultImg.src = "image/perfect_kebab.png";
        else if (score >= 90) resultImg.src = "image/great_kebab.png";
        else if (score >= 75) resultImg.src = "image/good_kebab.png";
        else if (score >= 50) resultImg.src = "image/ok_kebab.png";
        else resultImg.src = "image/miss_kebab.png";
      }
    }

    // === スコアテキスト設定 ===
    if (isKebabTarget) {
      scoreText.textContent =
        hitPercent >= 85
          ? `下から ${Math.round(100 - hitPercent)}% 地点に刺さった！`
          : `${rank.label}　${score}点`;
    } else {
      scoreText.textContent = rank.label;
    }
    scoreText.className = `font-bold ${rank.color} mt-2 text-center text-xl animate-pulse`;

    // === 高スコア時の光エフェクト ===
    if (score >= 90) {
      resultImg.style.filter = "drop-shadow(0 0 20px rgba(255, 215, 0, 1))";
    }

    // === リサイズ処理 ===
    const resizeContainer = () => {
      const padding = 32;
      const maxWidth = window.innerWidth * 0.8 - padding;
      const maxHeight = (window.innerHeight - 100) * 0.9 - padding;
      const size = Math.min(maxWidth, maxHeight);

      resultContainer.style.width = `${size}px`;
      resultContainer.style.height = `${size}px`;

      wordText.style.fontSize = `${Math.max(16, size * 0.06)}px`;
      scoreText.style.fontSize = `${Math.max(18, size * 0.045)}px`;
      hitPercentText.style.fontSize = `${Math.max(12, size * 0.03)}px`;
    };
    window.addEventListener('resize', resizeContainer);
    window.addEventListener('load', resizeContainer);

    // === X（旧Twitter）シェア機能 ===
    document.getElementById("shareButton").addEventListener("click", () => {
      const borderLine = "-------------------------------\n"
      const wordDisplay = isKebabTarget
        ? word.replace("-", " ").replace("_", " ")
        : word.replace("-", " ");
      const resultCase = (isKebabTarget && hitPercent >= 85)
        ? "新スネークケース"
        : matched.label;
      const rankText = isKebabTarget
        ? rank.label
        : "判定不能！";
      const resultSkewer = isKebabTarget
        ? ""
        : "串";
      const text = `🥙 #ケバブケースゲーム 🥙\n${borderLine}🍖素材：「${wordDisplay}」を串刺し！\n🥙仕上がり：${resultCase}${resultSkewer}\n💯スコア：${score}点\n🎯評価：${rankText}\n${borderLine}`;
      const pageUrl = window.location.origin + "/-kebab-case-game-/";

      function makeXUrl(text, url) {
        return `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
      }
      const tweetUrl = makeXUrl(text, pageUrl);
      window.open(tweetUrl, "_blank");
    });
  </script>
</body>
</html>
