<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>-ケバブ-ケース-ゲーム-</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="favicon.ico" type="image/vnd.microsoft.icon">
  <link rel="icon" href="favicon.ico" type="image/vnd.microsoft.icon">

  <!-- Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M4H2XHF2LC"></script>
  <script src="js/analytics.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="tailwind.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  >
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  </noscript>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-200 relative min-h-screen w-screen bg-[url('image/many_kebab.webp')] bg-center bg-cover">

  <!-- =========================
        ヘッダー
  ========================== -->
  <header class="site-header site-header--soft site-header--compact site-header--sticky">
    <h1 class="text-center text-lg font-bold m-2 text-yellow-800">🥙 ゲーム結果 🥙</h1>
  </header>

  <!-- =========================
        メインコンテンツ（結果表示）
  ========================== -->
  <main class="result-main flex justify-center items-center relative z-10 px-4">
    <!-- 結果コンテナ（正方形） -->
    <div id="resultContainer" class="result-shell relative bg-gray-100 rounded-lg shadow-lg flex justify-center items-center overflow-hidden">
      <img id="resultImg" src="" alt="" class="w-full h-full object-contain" />

      <!-- 下部テキスト群 -->
      <div class="bottom-third flex flex-col justify-center items-center px-2">
        <span id="wordText" class="result-word font-bold text-white drop-shadow-lg text-center"></span>
        <span id="scoreText" class="result-score font-bold text-white drop-shadow-lg mt-2 text-center text-xl"></span>
        <span id="hitPercentText" class="font-semibold text-white drop-shadow-lg mt-1 text-center"></span>
      </div>
    </div>
  </main>

  <!-- =========================
        固定ボタン群（共通デザイン）
  ========================== -->
  <div
    class="action-bar fixed left-1/2 transform -translate-x-1/2
           button-grid grid justify-center gap-3 z-30
           sm:flex sm:flex-nowrap sm:justify-center"
  >
    <!-- ホームボタン -->
    <a
      href="index.html"
      class="touch-button inline-flex items-center justify-center px-6 py-2 bg-blue-500/80 text-white font-semibold rounded-lg shadow-lg
             hover:bg-blue-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      ホーム
    </a>

    <!-- ゲーム再挑戦ボタン -->
    <a
      href="game.html"
      class="touch-button inline-flex items-center justify-center px-6 py-2 bg-red-500/80 text-white font-semibold rounded-lg shadow-lg
             hover:bg-red-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      ゲーム再挑戦
    </a>

    <!-- 結果シェアボタン -->
    <button
      id="shareButton"
      class="touch-button px-6 py-2 bg-green-500/80 text-white font-semibold rounded-lg shadow-lg
             hover:bg-green-600/80 transition duration-200 backdrop-blur-sm
             w-auto min-w-fit"
    >
      結果シェア
    </button>
  </div>

  <!-- =========================
        フッター
  ========================== -->
  <footer class="site-footer">
    <div class="flex flex-col sm:flex-row items-center justify-center relative">
      <!-- 左/中央部分 -->
      <p class="text-center m-1 text-sm text-yellow-800 sm:text-yellow-900 sm:text-base">
        -kebab-case-game-@NOA
      </p>
      <!-- スマホで少しスペース -->
      <span class="hidden sm:inline mx-2"></span>
      <!-- リンク部分 -->
      <a
        href="privacy.html"
        class="mt-1 sm:mt-0 sm:absolute sm:right-4 text-yellow-900/90 hover:underline text-sm"
      >
        プライバシーポリシー
      </a>
    </div>
  </footer>

  <script src="js/result-data.js"></script>
  <script src="js/result-core.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
