<html lang="ja">
<head prefix="og: https://ogp.me/ns#">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>-ケバブ-ケース-ゲーム-</title>

  <!-- Open Graph -->
  <meta property="og:title" content="-ケバブ-ケース-ゲーム-" />

  <meta property="og:image" content="https://noa-aon.github.io/-kebab-case-game-/image/ogp.png" />
  <meta property="og:url" content="https://noa-aon.github.io/-kebab-case-game-/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="-ケバブ-ケース-ゲーム-" />
  <meta property="og:locale" content="ja_JP" />

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="-ケバブ-ケース-ゲーム-" />
  <meta name="twitter:description" content="🥙落ちてくる単語に串を刺してケバブケースにするミニゲーム🥙" />
  <meta name="twitter:image" content="https://noa-aon.github.io/-kebab-case-game-/image/ogp.png" />

  <!-- Favicon -->
  <link rel="shortcut icon" href="favicon.ico" type="image/vnd.microsoft.icon">
  <link rel="icon" href="favicon.ico" type="image/vnd.microsoft.icon">

  <!-- Styles -->
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Analytics -->
  <script src="js/analytics.js"></script>
</head>

<body class="home-page bg-[url('image/many_kebab.webp')] bg-repeat bg-center bg-cover min-h-screen">
    
  <!-- ================================
       ヘッダー
  ================================= -->
  <header class="site-header site-header--soft site-header--regular site-header--sticky">
    <h1 class="text-center text-xl font-bold text-yellow-800">🥙 ホーム 🥙</h1>
  </header>

  <!-- ================================
       メインコンテンツ
  ================================= -->
  <main class="home-main w-full px-4 sm:px-8 lg:px-16">
    <div class="home-content">

      <!-- --------------------------------
           ケバブケース紹介カード
      --------------------------------- -->
      <section class="w-full max-w-3xl bg-amber-300/90 rounded-3xl shadow-xl p-6 sm:p-12 text-center text-lg leading-8 backdrop-blur-sm">
        <p class="mb-2">
          <span class="block sm:inline">みなさんは</span>
          <b>「<span class="text-accent">ケバブケース</span>」</b>
          <span class="block sm:inline">を知っていますか？</span>
        </p>

        <!-- ↓ 矢印アニメーション部分 ↓ -->
        <div class="relative flex justify-center items-center h-10 p-1 mb-2">
          <p class="text-lg font-medium animate-updown absolute">⇩こんなふうに⇩</p>
        </div>

        <!-- ケバブケース例 -->
        <div class="inline-block bg-gray-100/90 rounded-3xl px-4 py-2 m-2 text-lg Quicksand">
          hoge<b>-</b>fuga<b>-</b>piyo
        </div>

        <!-- 説明文 -->
        <p class="mt-3">
          <span class="block sm:inline">各単語を</span>
          <b><span class="text-accent">-（ハイフン）</span></b>
          <span class="block sm:inline">でつなぐ記法です。</span>
        </p>
        <p>
          まるで
          <b><span class="text-accent">串刺し</span>にした<span class="text-accent">ケバブ</span></b>
          <span class="block sm:inline">のように見えることから、</span>
        </p>
        <p>この名前で呼ばれているそう。</p>
      </section>

      <!-- --------------------------------
           ゲーム案内カード
      --------------------------------- -->
      <section class="w-full max-w-3xl bg-amber-300/90 rounded-3xl shadow-xl p-6 sm:p-12 text-center text-lg sm:text-xl leading-8 backdrop-blur-sm">
        <p class="mb-4 font-bold text-2xl">
          <span class="block sm:inline">さっそく</span>
          <span class="block sm:inline">ケバブケースを作ってみましょう！</span>
        </p>

        <!-- ↓ 矢印アニメーション部分 ↓ -->
        <div class="relative flex justify-center items-center h-10 p-1">
          <p class="text-lg font-medium animate-updown absolute">⇩⇩⇩</p>
        </div>

        <!-- ボタン群 -->
        <div class="flex flex-col sm:flex-row justify-center gap-4 mt-2 items-center w-full">

          <!-- 操作説明ボタン -->
          <a
            href="rules.html"
            class="inline-flex items-center justify-center w-auto px-6 py-3 bg-blue-500/80 text-white font-semibold rounded-lg shadow-lg hover:bg-blue-600/80 transition duration-200 backdrop-blur-sm">
            操作説明をみる
          </a>

          <!-- ゲーム開始ボタン -->
          <a
            href="game.html"
            class="inline-flex items-center justify-center w-auto px-6 py-3 bg-red-500/80 text-white font-semibold rounded-lg shadow-lg hover:bg-red-600/80 transition duration-200 backdrop-blur-sm">
            ゲームスタート
          </a>

          <!-- 用語解説ボタン -->
          <a
            href="glossary.html"
            class="inline-flex items-center justify-center w-auto px-6 py-3 bg-green-500/80 text-white font-semibold rounded-lg shadow-lg hover:bg-green-600/80 transition duration-200 backdrop-blur-sm">
            用語解説をみる
          </a>

        </div>
      </section>

    </div>
  </main>

  <!-- ================================
       フッター
  ================================= -->
  <footer class="site-footer">
    <div class="flex flex-col sm:flex-row items-center justify-center relative">
      <!-- 左/中央部分 -->
      <p class="text-center m-1 text-sm text-yellow-800 sm:text-yellow-900 sm:text-base">
        -kebab-case-game- by NOA
      </p>
      <!-- スマホで少しスペース -->
      <span class="hidden sm:inline mx-2"></span>
      <!-- リンク部分 -->
      <a
        href="privacy.html"
        class="mt-1 sm:mt-0 sm:absolute sm:right-4 text-yellow-900/90 hover:underline text-sm"
      >
        プライバシーポリシー
      </a>
    </div>
  </footer>

</body>
</html>
